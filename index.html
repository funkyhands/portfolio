<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Nigel Quek — Architecture & Design">
    <meta property="og:title" content="Nigel Quek — Architecture & Design">
    <meta property="og:description" content="Aspiring architect based in Singapore, studying at SUTD.">
    <meta property="og:image" content="https://funkyhands.github.io/portfolio/images/musicrev/hero1.jpg">
    <meta property="og:type" content="website">
    <title>Nigel Quek — Architecture & Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/universal.css">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

    <div class="preloader"><div class="preloader-text"></div></div>

    <header>
        <nav>
            <div class="nav-name"><a href="index.html">Nigel Quek</a></div>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="works.html">Works</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-content">
        <section class="hero">
            <h1 id="typed-heading"></h1>
            <p class="hero-role">I'm <span id="role-cycle" title="Click me!">an Architect</span></p>
            <p class="hero-sub">Based in Singapore, studying at SUTD. Passionate about reshaping spaces to enhance how people experience their surroundings.</p>
        </section>

        <section class="section">
            <p class="featured-heading">Featured Projects</p>
            <div class="carousel-wrapper">
                <div class="carousel-track" id="carousel">
                    <!-- Cards injected by JS -->
                </div>
                <div class="carousel-controls">
                    <div class="carousel-dots" id="carousel-dots"></div>
                    <div class="carousel-arrows">
                        <button class="carousel-arrow" id="prev-btn" aria-label="Previous">&larr;</button>
                        <button class="carousel-arrow" id="next-btn" aria-label="Next">&rarr;</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Mini Game -->
    <div class="mini-game">
        <button class="mini-game-toggle" id="game-toggle" title="Build something!">&#9632;</button>
    </div>
    <div class="game-canvas" id="game-panel">
        <span class="game-score" id="game-score">0</span>
        <span class="game-hint">Click to stack</span>
        <canvas id="game-canvas"></canvas>
    </div>

    <a class="to-top" href="#">&uarr;</a>

    <footer>
        <div>&copy; Nigel Quek 2025</div>
    </footer>

    <script src="js/universal.js"></script>
    <script>
        const projects = [
            {
                title: "Music Revitalisation",
                tag: "Spatial Design",
                image: "images/musicrev/hero1.jpg",
                link: "musicrev.html"
            },
            {
                title: "Superbrandotel",
                tag: "Hospitality",
                image: "images/hospitality/livingroom.jpg",
                link: "hospitality.html"
            },
            {
                title: "Exercises",
                tag: "Architecture",
                image: "images/exercises/isometric.png",
                link: "exercises.html"
            },
            {
                title: "Protocemetery",
                tag: "Architecture",
                image: "images/protocemetery/render3.jpg",
                link: "protocemetery.html"
            },
        ];

        const track = document.getElementById('carousel');
        const dotsContainer = document.getElementById('carousel-dots');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // Build cards
        projects.forEach(p => {
            const card = document.createElement('a');
            card.href = p.link;
            card.className = 'project-card';
            card.innerHTML = `
                <div class="card-image">
                    <img src="${p.image}" alt="${p.title}">
                </div>
                <div class="project-info">
                    <div class="project-title">${p.title}</div>
                    <div class="project-tag">${p.tag}</div>
                </div>
            `;

            // Mouse tilt
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `perspective(600px) rotateY(${x * 8}deg) rotateX(${-y * 6}deg)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });

            track.appendChild(card);
        });

        // Build dots (one per visible "page" of 2 cards)
        const totalPages = Math.ceil(projects.length / 2);
        for (let i = 0; i < totalPages; i++) {
            const dot = document.createElement('button');
            dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
            dot.setAttribute('aria-label', `Page ${i + 1}`);
            dot.addEventListener('click', () => scrollToPage(i));
            dotsContainer.appendChild(dot);
        }

        function scrollToPage(page) {
            const card = track.children[page * 2];
            if (card) {
                track.scrollTo({ left: card.offsetLeft - track.offsetLeft, behavior: 'smooth' });
            }
        }

        // Arrow buttons
        let currentPage = 0;

        prevBtn.addEventListener('click', () => {
            currentPage = Math.max(0, currentPage - 1);
            scrollToPage(currentPage);
        });

        nextBtn.addEventListener('click', () => {
            currentPage = Math.min(totalPages - 1, currentPage + 1);
            scrollToPage(currentPage);
        });

        // Update dots on scroll
        track.addEventListener('scroll', () => {
            const scrollLeft = track.scrollLeft;
            const cardWidth = track.children[0].offsetWidth + 32; // card width + gap
            const page = Math.round(scrollLeft / (cardWidth * 2));
            currentPage = Math.min(page, totalPages - 1);

            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentPage);
            });
        });

        // Drag to scroll
        let isDragging = false;
        let startX, scrollStart;

        track.addEventListener('mousedown', e => {
            isDragging = true;
            startX = e.pageX;
            scrollStart = track.scrollLeft;
            track.style.scrollBehavior = 'auto';
        });

        track.addEventListener('mousemove', e => {
            if (!isDragging) return;
            e.preventDefault();
            const dx = e.pageX - startX;
            track.scrollLeft = scrollStart - dx;
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                track.style.scrollBehavior = 'smooth';
            }
        });

        // Typed text effect with hoverable letters
        (function () {
            const el = document.getElementById('typed-heading');
            const lines = ['Architecture', '& Design'];
            let lineIndex = 0;
            let charIndex = 0;
            const speed = 60;
            const lineDelay = 200;

            const cursor = document.createElement('span');
            cursor.className = 'typed-cursor';
            el.appendChild(cursor);

            function type() {
                if (lineIndex >= lines.length) {
                    setTimeout(() => cursor.remove(), 1500);
                    return;
                }

                const line = lines[lineIndex];

                if (charIndex === 0 && lineIndex > 0) {
                    el.insertBefore(document.createElement('br'), cursor);
                }

                if (charIndex < line.length) {
                    const span = document.createElement('span');
                    span.className = 'hero-letter';
                    span.textContent = line[charIndex] === ' ' ? '\u00A0' : line[charIndex];
                    el.insertBefore(span, cursor);
                    charIndex++;
                    setTimeout(type, speed);
                } else {
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(type, lineDelay);
                }
            }

            setTimeout(type, 500);
        })();

        // Role cycler
        (function () {
            const roles = ['an Architect', 'a Photographer', 'a Cyclist', 'a Mountain Climber', 'a Designer', 'a Student'];
            let index = 0;
            const el = document.getElementById('role-cycle');

            el.addEventListener('click', () => {
                index = (index + 1) % roles.length;
                el.classList.add('pop');
                setTimeout(() => {
                    el.textContent = roles[index];
                    el.classList.remove('pop');
                }, 150);
            });
        })();

        // Mini stacking game
        (function () {
            const toggle = document.getElementById('game-toggle');
            const panel = document.getElementById('game-panel');
            const canvas = document.getElementById('game-canvas');
            const scoreEl = document.getElementById('game-score');
            const ctx = canvas.getContext('2d');

            let open = false;
            let blocks = [];
            let moving = null;
            let score = 0;
            let gameOver = false;
            let dir = 1;
            const bw = 60;  // starting block width
            const bh = 16;
            const speed = 2;
            const groundY = 280;

            toggle.addEventListener('click', () => {
                open = !open;
                panel.classList.toggle('active', open);
                if (open) initGame();
            });

            function initGame() {
                canvas.width = 200;
                canvas.height = 300;
                blocks = [];
                score = 0;
                gameOver = false;
                scoreEl.textContent = '0';

                // Base block
                blocks.push({ x: 70, y: groundY, w: bw, h: bh });
                spawnBlock();
                requestAnimationFrame(loop);
            }

            function spawnBlock() {
                const prev = blocks[blocks.length - 1];
                moving = { x: 0, y: prev.y - bh, w: prev.w, h: bh };
                dir = 1;
            }

            canvas.addEventListener('click', () => {
                if (gameOver) { initGame(); return; }
                if (!moving) return;

                const prev = blocks[blocks.length - 1];
                const overlap = Math.min(moving.x + moving.w, prev.x + prev.w) - Math.max(moving.x, prev.x);

                if (overlap <= 0) {
                    gameOver = true;
                    return;
                }

                const newX = Math.max(moving.x, prev.x);
                blocks.push({ x: newX, y: moving.y, w: overlap, h: bh });
                score++;
                scoreEl.textContent = score;
                moving = null;

                // Scroll view up as tower grows
                if (blocks.length > 12) {
                    blocks.forEach(b => b.y += bh);
                }

                spawnBlock();
            });

            function loop() {
                if (!open) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw blocks
                blocks.forEach((b, i) => {
                    const shade = 30 + (i * 12) % 180;
                    ctx.fillStyle = `rgb(${shade}, ${shade}, ${shade})`;
                    ctx.fillRect(b.x, b.y, b.w, b.h - 1);
                });

                // Draw moving block
                if (moving && !gameOver) {
                    moving.x += speed * dir;
                    if (moving.x + moving.w > canvas.width) dir = -1;
                    if (moving.x < 0) dir = 1;

                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(moving.x, moving.y, moving.w, moving.h - 1);
                }

                // Game over text
                if (gameOver) {
                    ctx.fillStyle = 'rgba(255,255,255,0.85)';
                    ctx.fillRect(0, 120, 200, 60);
                    ctx.fillStyle = '#1a1a1a';
                    ctx.font = '14px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Score: ' + score, 100, 148);
                    ctx.font = '11px Inter, sans-serif';
                    ctx.fillStyle = '#999';
                    ctx.fillText('Click to restart', 100, 168);
                }

                requestAnimationFrame(loop);
            }
        })();
    </script>

</body>
</html>
