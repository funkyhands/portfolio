            <a href="nepal23.html" class="blog-entry">

    <script src="js/universal.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            scrollWheelZoom: false
        }).setView([25, 50], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
            maxZoom: 19
        }).addTo(map);

        const adventures = [
            { lat: 1.3521, lng: 103.8198, title: "Singapore", desc: "Starting point — Cycling to Hanoi", link: "hotdog.html" },
            { lat: 21.0285, lng: 105.8542, title: "Hanoi, Vietnam", desc: "Finish — Cycling from Singapore", link: "hotdog.html" },
            { lat: 28.8, lng: 83.88, title: "Thorong La Pass, Nepal", desc: "Hiking Thorong La Pass", link: "nepal23.html" },
            { lat: -8.13, lng: 114.04, title: "Mount Raung, Indonesia", desc: "Hiking Mount Raung", link: "indo23.html" },
            { lat: -7.92, lng: 112.95, title: "Mount Bhutak, Indonesia", desc: "Hiking Mount Bhutak", link: "indo24.html" },
            { lat: 15.02, lng: 100.41, title: "Khao Chin Lae, Thailand", desc: "Rock Climbing in Lopburi", link: "lopburi23.html" },
            { lat: 40.4168, lng: -3.7038, title: "Madrid, Spain", desc: "Madrid" },
            { lat: 40.9429, lng: -4.1088, title: "Segovia, Spain", desc: "Segovia" },
            { lat: 42.6, lng: 0.5, title: "Pyrenees", desc: "Pyrenees" },
            { lat: 31.6295, lng: -7.9811, title: "Marrakech, Morocco", desc: "Marrakech" },
            { lat: 46.2940, lng: 7.8816, title: "Visp, Switzerland", desc: "Visp" }
        ];

        adventures.forEach(a => {
            L.circleMarker([a.lat, a.lng], {
                radius: 6,
                fillColor: '#1a1a1a',
                color: '#1a1a1a',
                weight: 1,
                fillOpacity: 0.8
            })
            .addTo(map)
            .bindPopup(`<strong>${a.title}</strong><br><a href="${a.link}">${a.desc}</a>`);
        });
    </script>

</body>
</html>
